    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: rgba(20,22,26,0.92);
    backdrop-filter: blur(10px);
    z-index: 50;
  }
  .eyebrow{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  h1{
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{
    font-size: 13px;
    color: var(--ink-dim);
  }

  /* ---------- DAY TABS ---------- */
  .tabs{
    display:flex;
    gap: 8px;
    padding: 14px 20px 0;
    overflow-x: auto;
  }
  .tab{
    flex: 1;
    text-align: center;
    padding: 12px 6px;
    border-radius: 10px 10px 0 0;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--ink-dim);
    background: transparent;
    border: 1px solid var(--line);
    border-bottom: none;
    cursor: pointer;
    position: relative;
    top: 1px;
  }
  .tab .letter{
    font-family: var(--serif);
    font-size: 20px;
    display:block;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .tab.active{
    background: var(--bg-card);
    color: var(--accent);
    border-color: var(--line);
  }
  .tab.active .letter{ color: var(--accent); }

  main{
    padding: 0 16px 30px;
    max-width: 640px;
    margin: 0 auto;
  }

  .day-panel{ display:none; }
  .day-panel.active{ display:block; }

  .day-title{
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink);
    padding: 18px 4px 4px;
  }
  .day-title small{
    display:block;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 3px;
    font-weight: 400;
  }

  .warmup{
    margin: 10px 4px 18px;
    padding: 10px 14px;
    border-left: 2px solid var(--accent-dim);
    font-size: 13px;
    color: var(--ink-dim);
    font-style: italic;
  }

  /* ---------- MUSCLE GROUP ---------- */
  .group{
    margin: 22px 0 8px;
    padding: 0 4px;
    display:flex;
    align-items:baseline;
    gap: 10px;
  }
  .group-name{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .group-line{
    flex:1;
    height:1px;
    background: var(--line);
  }

  /* ---------- EXERCISE CARD ---------- */
  .ex-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .ex-name{
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .ex-stats{
    display:flex;
    gap: 18px;
    margin-bottom: 10px;
  }
  .stat{
    display:flex;
    flex-direction: column;
  }
  .stat-val{
    font-family: var(--mono);
    font-size: 16px;
    color: var(--ink);
  }
  .stat-label{
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 2px;
  }
  .ex-note{
    font-size: 12.5px;
    color: var(--ink-dim);
    line-height: 1.45;
    margin-bottom: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .ex-note:empty{ display:none; }

  /* ---------- WEIGHT INPUT ---------- */
  .weight-row{
    display:flex;
    align-items:center;
    gap: 10px;
    background: var(--bg-card-hi);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .weight-row .wlabel{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    flex-shrink:0;
  }
  .stepper{
    display:flex;
    align-items:center;
    flex:1;
    justify-content:flex-end;
    gap: 8px;
  }
  .step-btn{
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--accent);
    font-size: 17px;
    font-family: var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
  }
  .step-btn:active{ background: var(--accent-dim); }
  .weight-input{
    width: 64px;
    text-align:center;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 4px 0;
    -moz-appearance: textfield;
  }
  .weight-input::-webkit-outer-spin-button,
  .weight-input::-webkit-inner-spin-button{
    -webkit-appearance: none;
    margin:0;
  }
  .weight-input:focus{ outline:none; border-bottom-color: var(--accent); }
  .unit{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-faint);
  }
  .saved-flash{
    font-size: 10px;
    color: var(--good);
    font-family: var(--mono);
    opacity: 0;
    transition: opacity 0.25s;
    margin-left: 4px;
    white-space: nowrap;
  }
  .saved-flash.show{ opacity:1; }

  /* circuit-style cards (no weight) */
  .ex-card.circuit .ex-stats{ margin-bottom: 0; }
  .ex-card.circuit .ex-note{ border-top:none; padding-top:0; margin-top: 8px; }

  /* ---------- PROGRESS / WEEK NOTE ---------- */
  .week-note{
    margin: 18px 4px 6px;
    padding: 12px 14px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-dim), transparent);
    border: 1px solid var(--line);
    font-size: 12.5px;
    color: var(--ink-dim);
  }
  .week-note b{ color: var(--accent); font-weight:600; }

  footer{
    text-align:center;
    padding: 30px 20px 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  .reset-wrap{
    text-align:center;
    margin-top: 18px;
  }
  .reset-btn{
    background:none;
    border: 1px solid var(--line);
    color: var(--ink-faint);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 8px;
    cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Scheda &middot; Condizionamento generale &middot; 4 settimane</div>
  <h1>Matteo Callegher</h1>
  <div class="sub">In questa fase conta curare tecnica ed esecuzione</div>
</header>

<div class="tabs" id="tabs"></div>

<main id="main"></main>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetWeights()">Azzera tutti i pesi salvati</button>
</div>

<footer>Aggiornata automaticamente sul telefono &middot; nessun dato lasciato online</footer>

<script>
/* ============== DATI SCHEDA ============== */
const DAYS = [
  {
    id: "A",
    title: "Petto + Deltoidi + Bicipiti",
    warmup: "Corsa 10' ritmo blando + Mobilità articolare 5'",
    groups: [
      {
        name: "Pettorali",
        exercises: [
          { id:"a1", name:"Push Ups", sets:"4", reps:"8-10", rest:"1.30", note:"Presa poco più larga delle spalle, gomiti rivolti sempre verso dietro", weight:false },
          { id:"a2", name:"Distensioni Panca Piana con Bilanciere", sets:"4", reps:"10", rest:"1.30", note:"Trova il peso giusto e cerca di aumentarlo anche di poco ogni settimana", weight:true },
          { id:"a3", name:"Croci con Manubri Panca Inclinata (30°)", sets:"4", reps:"12", rest:"1.30", note:"", weight:true },
        ]
      },
      {
        name: "Deltoidi",
        exercises: [
          { id:"a4", name:"Lento Avanti in piedi", sets:"4", reps:"10", rest:"1.30", note:"Peso piccolo, esecuzione controllata", weight:true },
          { id:"a5", name:"Alzate Laterali", sets:"3", reps:"12", rest:"1.30", note:"Non esagerare col peso, basta anche uno piccolo: importante lenta e controllata", weight:true },
        ]
      },
      {
        name: "Bicipiti",
        exercises: [
          { id:"a6", name:"Curl con Bilanciere", sets:"4", reps:"10", rest:"1.30", note:"Peso piccolo, porta avanti l'omero in chiusura", weight:true },
          { id:"a7", name:"Curl con Manubri su Panca Inclinata", sets:"3", reps:"10/braccio", rest:"—", note:"Esegui bene la supinazione all'inizio", weight:true },
        ]
      },
      {
        name: "Addominali",
        exercises: [
          { id:"a8", name:"Circuito: Plank 30'' · Crunch 30'' · Sit up 30''", sets:"3", reps:"30''+30''+30''", rest:"1'", note:"Incrementa di una serie alla seconda settimana", weight:false, circuit:true },
        ]
      }
    ],
    closing: "Stretching e mobilità articolare 1'"
  },
  {
    id: "B",
    title: "Gambe e Paravertebrali",
    warmup: "Corsa 10' ritmo blando + Mobilità articolare 5'",
    groups: [
      {
        name: "Paravertebrali",
        exercises: [
          { id:"b1", name:"Hyperextension", sets:"3", reps:"10", rest:"1.30", note:"Con sovraccarico", weight:true },
        ]
      },
      {
        name: "Quadricipiti",
        exercises: [
          { id:"b2", name:"Squat", sets:"4", reps:"10", rest:"1.30", note:"Esecuzione controllata, traiettoria sempre verticale del bilanciere", weight:true },
          { id:"b3", name:"Leg Extension", sets:"4", reps:"12", rest:"1.30", note:"", weight:true },
        ]
      },
      {
        name: "Ischiocrurali",
        exercises: [
          { id:"b4", name:"Stacco a Gambe Tese", sets:"4", reps:"10", rest:"1.30", note:"", weight:true },
          { id:"b5", name:"Leg Curl", sets:"4", reps:"12", rest:"1.30", note:"", weight:true },
        ]
      },
      {
        name: "Calf",
        exercises: [
          { id:"b6", name:"Calf in piedi (manubrio o macchina)", sets:"4", reps:"12", rest:"1.30", note:"Esecuzione lenta in discesa", weight:true },
        ]
      },
      {
        name: "Addominali",
        exercises: [
          { id:"b7", name:"Plank", sets:"3'", reps:"totali", rest:"—", note:"Fai il massimo di secondi, fermati, riposa e riprendi fino ad arrivare a 3 minuti totali", weight:false, circuit:true },
          { id:"b8", name:"Gambe al Petto sulla Sbarra", sets:"3", reps:"8", rest:"1'", note:"", weight:false },
        ]
      }
    ],
    closing: "Stretching"
  },
  {
    id: "C",
    title: "Dorsali + Deltoidi Posteriori + Bicipiti",
    warmup: "Corsa 10' ritmo blando + Mobilità articolare 5'",
    groups: [
      {
        name: "Dorsali",
        exercises: [
          { id:"c1", name:"Pull Up (Buffer 1)", sets:"4", reps:"2", rest:"1", note:"Ti devi fermare 1 ripetizione prima di quella a cedimento", weight:false },
          { id:"c2", name:"Pulley Basso", sets:"4", reps:"10", rest:"1.30", note:"Adduci bene le scapole", weight:true },
          { id:"c3", name:"Lat Machine Avanti", sets:"3", reps:"12", rest:"1.30", note:"", weight:true },
        ]
      },
      {
        name: "Deltoidi Posteriori",
        exercises: [
          { id:"c4", name:"Croci a 90°", sets:"4", reps:"8", rest:"1.30", note:"Attento a non sforzare la schiena: mantieni le curve fisiologiche e un carico basso", weight:true },
        ]
      },
      {
        name: "Tricipiti",
        exercises: [
          { id:"c5", name:"Distensioni su Panca Presa Stretta", sets:"4", reps:"10", rest:"1.30", note:"", weight:true },
          { id:"c6", name:"Push Down ai Cavi", sets:"3", reps:"12", rest:"1.30", note:"", weight:true },
        ]
      },
      {
        name: "Addominali",
        exercises: [
          { id:"c7", name:"Circuito: Plank 30'' · Crunch 30'' · Sit up 30''", sets:"3", reps:"30''+30''+30''", rest:"1'", note:"Incrementa di una serie alla seconda settimana", weight:false, circuit:true },
        ]
      }
    ],
    closing: "Stretching + mobilità"
  }
];

/* ============== STORAGE ============== */
const STORE_KEY = "callegher_weights_v1";
function loadWeights(){
  try{
    return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
  }catch(e){ return {}; }
}
function saveWeight(exId, value){
  const data = loadWeights();
  data[exId] = value;
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}
function resetWeights(){
  if(confirm("Vuoi davvero azzerare tutti i pesi salvati?")){
    localStorage.removeItem(STORE_KEY);
    render();
  }
}

/* ============== RENDER ============== */
const weights = loadWeights();

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = DAYS.map((d,i) => `
    <button class="tab ${i===0?'active':''}" data-day="${d.id}" onclick="selectDay('${d.id}')">
      <span class="letter">${d.id}</span>${d.title.split(' ')[0]}
    </button>
  `).join("");
}

function exerciseCard(ex){
  const savedWeight = weights[ex.id] !== undefined ? weights[ex.id] : "";
  const weightBlock = ex.weight ? `
    <div class="weight-row">
      <span class="wlabel">Peso</span>
      <div class="stepper">
        <button class="step-btn" onclick="stepWeight('${ex.id}', -2.5)">−</button>
        <input class="weight-input" type="number" inputmode="decimal" step="0.5"
               id="input-${ex.id}" value="${savedWeight}" placeholder="—"
               oninput="onWeightChange('${ex.id}', this.value)">
        <span class="unit">kg</span>
        <button class="step-btn" onclick="stepWeight('${ex.id}', 2.5)">+</button>
      </div>
      <span class="saved-flash" id="flash-${ex.id}">salvato</span>
    </div>
  ` : "";

  return `
    <div class="ex-card ${ex.circuit ? 'circuit':''}">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-stats">
        <div class="stat"><span class="stat-val">${ex.sets}</span><span class="stat-label">Serie</span></div>
        <div class="stat"><span class="stat-val">${ex.reps}</span><span class="stat-label">Reps</span></div>
        <div class="stat"><span class="stat-val">${ex.rest}</span><span class="stat-label">Rest</span></div>
      </div>
      ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ""}
      ${weightBlock}
    </div>
  `;
}

function dayPanel(day, index){
  const groupsHtml = day.groups.map(g => `
    <div class="group">
      <span class="group-name">${g.name}</span>
      <span class="group-line"></span>
    </div>
    ${g.exercises.map(exerciseCard).join("")}
  `).join("");

  return `
    <div class="day-panel ${index===0?'active':''}" id="panel-${day.id}">
      <div class="day-title">Giorno ${day.id} — ${day.title}</div>
      <div class="warmup">${day.warmup}</div>
      ${groupsHtml}
      <div class="week-note"><b>Chiusura.</b> ${day.closing}</div>
    </div>
  `;
}

function render(){
  renderTabs();
  document.getElementById("main").innerHTML = DAYS.map((d,i) => dayPanel(d,i)).join("");
}

function selectDay(id){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.day === id));
  document.querySelectorAll(".day-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
  window.scrollTo({top:0, behavior:"instant"});
}

let flashTimers = {};
function onWeightChange(exId, value){
  saveWeight(exId, value);
  weights[exId] = value;
  const flash = document.getElementById("flash-" + exId);
  if(flash){
    flash.classList.add("show");
    clearTimeout(flashTimers[exId]);
    flashTimers[exId] = setTimeout(() => flash.classList.remove("show"), 1200);
  }
}

function stepWeight(exId, delta){
  const input = document.getElementById("input-" + exId);
  let current = parseFloat(input.value) || 0;
  let next = Math.max(0, current + delta);
  next = Math.round(next * 10) / 10;
  input.value = next;
  onWeightChange(exId, next);
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>

</body>
</html>
